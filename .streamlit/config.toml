[theme]
base = "light"
primaryColor = "#025a9a"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f7fafc"
textColor = "#1a202c"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
enableCORS = true
enableXsrfProtection = true
headless = true
maxUploadSize = 200
maxMessageSize = 200

[client]
caching = true